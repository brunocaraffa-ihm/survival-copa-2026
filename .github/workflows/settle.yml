name: settle

# Free near-real-time settlement: hits the protected cron endpoint every 30 min.
# The Vercel Hobby plan only allows a daily cron, so this GitHub Action provides
# finer-grained settlement during the tournament. CRON_SECRET is a repo secret.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  settle:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger settlement
        run: |
          curl -sS -X GET "https://survival-copa-2026.vercel.app/api/cron/settle" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --fail-with-body
