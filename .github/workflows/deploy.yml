name: Deploy to Vercel (production)

# Deploys the production build on every push to main, and on manual trigger.
# Requires ONE repo secret: VERCEL_TOKEN (Settings → Secrets and variables → Actions).
# Create the token at: Vercel → Account Settings → Tokens.
# The org/project IDs below are identifiers (not secrets) from .vercel/project.json.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Avoid overlapping prod deploys; cancel a superseded run.
concurrency:
  group: vercel-production
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_yBVexInWQviy1bwQ7KwrVU0b
  VERCEL_PROJECT_ID: prj_z838PThI1cmQYRETYb1fqjlaCdtk

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings + env (production)
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build (production)
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt artifact to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
